name: UPI Fraud Detection CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - "*"

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fraud_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create database tables
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/fraud_db
        run: python -m db.init_db

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/fraud_db
        run: |
          python -m pytest -v

      - name: Validate Docker Compose
        run: |
          docker compose config
      
      - name: Build Docker Compose Images
        run: |
          docker compose build
      
      
docker-publish:
  needs: test-build
  runs-on: ubuntu-latest

  if: github.ref == 'refs/heads/main'

  steps:
    - uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push API
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/upi-fraud-detection-api:latest
          ${{ secrets.DOCKER_USERNAME }}/upi-fraud-detection-api:${{ github.sha }}

    - name: Build and Push Dashboard
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/upi-fraud-dashboard:latest
          ${{ secrets.DOCKER_USERNAME }}/upi-fraud-dashboard:${{ github.sha }}